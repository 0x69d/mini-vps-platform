# VM セグメント用の独立 NAT ネットワーク定義(tasks/segment_network.yml が参照)。
# ポリシー: セグメント間は相互遮断、各セグメントから外向き NAT は許可。
# サブネットは「192.168.(200+セグメント番号).0/24」の規則で採番する
# (default の 192.168.122.0/24 や一般的な家庭用レンジとの衝突を避ける)。
# default ネットワーク(virbr0 / 192.168.122.0/24)はここに含めず、
# tasks/network.yml(ディストリ同梱 XML)で従来どおり管理する。
# 制約: name は VM spec の network フィールドの文字種制約(英数字始まり・
# 英数字/ハイフン/アンダースコア・63文字以内)、bridge は 15 文字以内(IFNAMSIZ)。
network_segments:
  - name: seg1
    bridge: virbr-seg1
    gateway: 192.168.201.1
    netmask: 255.255.255.0
    dhcp_start: 192.168.201.2
    dhcp_end: 192.168.201.254
  - name: seg2
    bridge: virbr-seg2
    gateway: 192.168.202.1
    netmask: 255.255.255.0
    dhcp_start: 192.168.202.2
    dhcp_end: 192.168.202.254
  - name: seg3
    bridge: virbr-seg3
    gateway: 192.168.203.1
    netmask: 255.255.255.0
    dhcp_start: 192.168.203.2
    dhcp_end: 192.168.203.254
  # seg4 は minivps-k8s-appliance のK8sクラスタ専用セグメント。
  # DHCPレンジを .200-.254 に狭め、.2-.199 をクラスタノードの静的IP
  # (cp=.10, worker=.21〜)用に空けてある(seg1-3のような全域DHCPだと
  # 静的IPとリースが衝突しうるため)。
  - name: seg4
    bridge: virbr-seg4
    gateway: 192.168.204.1
    netmask: 255.255.255.0
    dhcp_start: 192.168.204.200
    dhcp_end: 192.168.204.254
