- name: mini-vps-platform ホスト事前セットアップ
  hosts: localhost
  gather_facts: true
  # virsh の出力はホストのロケール(例: ja_JP.UTF-8)に従って "State:"/"Autostart:" 等が
  # 翻訳される。以降のタスクの changed_when/when はこの英語ラベルの正規表現に依存するため、
  # play全体でCロケールを強制する。
  environment:
    LC_ALL: "C"
    LANG: "C"
  vars:
    vps_user: "{{ ansible_facts['user_id'] }}"
    vps_home: "{{ ansible_facts['user_dir'] }}"
    seed_dir: /var/lib/libvirt/seeds
    images_pool_path: /var/lib/libvirt/images
  vars_files:
    - vars/guest_images.yml
    - vars/network_segments.yml
  tasks:
    - name: パッケージを導入する
      ansible.builtin.import_tasks: tasks/packages.yml

    - name: libvirtd を有効化しグループを設定する
      ansible.builtin.import_tasks: tasks/libvirtd.yml

    - name: default ネットワークを用意する
      ansible.builtin.import_tasks: tasks/network.yml

    - name: セグメント NAT ネットワークを用意する
      ansible.builtin.include_tasks: tasks/segment_network.yml
      loop: "{{ network_segments }}"
      loop_control:
        loop_var: segment
        label: "{{ segment.name }}"

    - name: images プールを用意する
      ansible.builtin.import_tasks: tasks/images_pool.yml

    - name: base image を配置する
      ansible.builtin.import_tasks: tasks/base_images.yml

    - name: seeds ディレクトリを用意する
      ansible.builtin.import_tasks: tasks/seeds_dir.yml

    - name: SSH 鍵を用意する
      ansible.builtin.import_tasks: tasks/ssh_key.yml
