# vps_user は接続ユーザー自身(become不要)。自分自身に become で昇格すると
# 「一時ファイルの権限設定に失敗する」典型的な罠を踏むため、直接実行する。
#
# ユーザーの個人鍵(id_ed25519 等)とは別に、本ツール専用の minivps_ed25519 を
# 生成する。この鍵の公開鍵はゲストVMの ~/.ssh/authorized_keys にそのまま
# コピーされるため、コメントは空にしてホスト名やユーザー名が漏れないようにする。
- name: ~/.ssh ディレクトリを作成する
  ansible.builtin.file:
    path: "{{ vps_home }}/.ssh"
    state: directory
    mode: "0700"

- name: ed25519 SSH 鍵を生成する(未生成の場合のみ)
  ansible.builtin.command: >
    ssh-keygen -t ed25519 -f {{ vps_home }}/.ssh/minivps_ed25519 -N "" -C ""
  args:
    creates: "{{ vps_home }}/.ssh/minivps_ed25519.pub"
