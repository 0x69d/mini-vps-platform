- name: パッケージを導入する(Debian系)
  become: true
  ansible.builtin.apt:
    name:
      - libvirt-daemon-system
      - libvirt-clients
      - qemu-system-x86
      - qemu-utils
      - cloud-image-utils
      - libvirt-dev
      - python3-dev
      - pkg-config
      - build-essential
      - ebtables
      - iptables
      - arptables
      - ovmf
      - openvswitch-switch
      # フルの dnsmasq はインストール時に 0.0.0.0:53 で自動起動し
      # systemd-resolved と衝突するため、デーモン登録の無い dnsmasq-base
      # (libvirt 自身も利用)を使う。
      - dnsmasq-base
    state: present
    update_cache: true
  when: ansible_facts['os_family'] == 'Debian'

- name: パッケージを導入する(RedHat系)
  become: true
  ansible.builtin.dnf:
    name:
      - libvirt
      - libvirt-client
      - qemu-kvm
      - qemu-img
      - cloud-utils
      - libvirt-devel
      - python3-devel
      - pkgconf-pkg-config
      - gcc
      - ebtables
      - iptables
      - arptables
      - edk2-ovmf
      - openvswitch
      # RedHat 系の dnsmasq はサービスが自動有効化されないため
      # そのまま導入する(専用ユニット minivps-dnsmasq.service から起動する)。
      - dnsmasq
    state: present
  when: ansible_facts['os_family'] == 'RedHat'
