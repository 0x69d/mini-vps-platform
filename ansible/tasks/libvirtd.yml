- name: libvirtd を起動・自動起動を有効にする(Debian系)
  become: true
  ansible.builtin.service:
    name: libvirtd
    state: started
    enabled: true
  when: ansible_facts['os_family'] == 'Debian'

# RedHat 系(Fedora/RHEL9 以降)はモジュラーデーモン(virtqemud 等)が既定。
# モノリシック libvirtd を起動すると、default ネットワークの自動起動などで
# モジュラーデーモンと bridge/dnsmasq を二重に掴み合う(EADDRINUSE)ため、
# socket 単位で明確に無効化しておく。
- name: モノリシック libvirtd 一式をマスクする(RedHat系)
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    masked: true
  loop:
    - libvirtd.service
    - libvirtd.socket
    - libvirtd-ro.socket
    - libvirtd-admin.socket
  when: ansible_facts['os_family'] == 'RedHat'

# qemu/network/storage/nwfilter の4ドライバは本プロジェクトが実際に使う
# (domain XML・NAT ネットワーク・pool/volume・パケットフィルタ)。ディストリの
# 既定でソケットが有効化されている前提を置かず、明示的に有効化する
# (Fedora は既定で有効なため冪等に no-op、AlmaLinux は既定で無効なため
# net-define 等が virtnetworkd-sock 不在で失敗していた)。
- name: モジュラーデーモンのソケットを有効化する(RedHat系)
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - virtqemud.socket
    - virtnetworkd.socket
    - virtstoraged.socket
    - virtnwfilterd.socket
  when: ansible_facts['os_family'] == 'RedHat'

- name: 実行ユーザーを libvirt グループに追加する
  become: true
  ansible.builtin.user:
    name: "{{ vps_user }}"
    groups: libvirt
    append: true
  register: minivps_libvirt_group

- name: グループ反映には再ログインが必要な旨を表示する
  ansible.builtin.debug:
    msg: >-
      {{ vps_user }} を libvirt グループに追加しました。このシェルにまだ反映
      されていない場合は再ログイン(または `newgrp libvirt`)してください。
  when: minivps_libvirt_group is changed
