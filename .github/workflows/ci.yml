name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libvirt build headers
        # libvirt-python は sdist ビルドに libvirt 開発ヘッダを要する。
        run: |
          sudo apt-get update
          sudo apt-get install -y libvirt-dev pkg-config

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Pytest
        run: uv run pytest

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare dummy .env for compose config validation
        # GF_SECURITY_ADMIN_PASSWORD は :? (未設定なら失敗) 形式のため、
        # 構文検証用にプレースホルダの .env を用意する(実際のシークレットではない)。
        run: cp .env.example .env

      - name: Validate docker-compose.yml syntax
        run: docker compose config -q

  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Sync ops-only dependencies
        # --no-install-project でmini_vps本体(libvirt-python含む)のビルドを避ける。
        # ansible-core/ansible-lint はpure Pythonで完結し、libvirt-devは不要。
        run: uv sync --only-group ops --no-install-project

      - name: Ansible syntax check
        run: uv run ansible-playbook -i ansible/inventory.ini ansible/playbook.yml --syntax-check

      - name: ansible-lint
        run: uv run ansible-lint ansible/playbook.yml
